<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Exercício 3</title>
</head>
<body class="container mt-5">
    <h1>Maior e Menor Número</h1>
    <p>Clique no botão para digitar 5 números.</p>
    
    <button onclick="descobrirValores()" class="btn btn-primary">Iniciar Entrada</button>
    
    <div class="mt-4">
        <p id="exibirVetor"></p>
        <p id="resultadoMaior" class="text-danger h5"></p>
        <p id="resultadoMenor" class="text-primary h5"></p>
    </div>

    <a href="index.html" class="btn btn-secondary mt-3">Voltar</a>

    <script>
        function descobrirValores() {
            let vetor = [];
            
            for (let i = 0; i < 5; i++) {
                let entrada = prompt("Digite o número " + (i + 1) + ":");
                vetor.push(Number(entrada));
            }

            let maior = vetor[0];
            let menor = vetor[0];

            for (let i = 0; i < vetor.length; i++) {
                if (vetor[i] > maior) {
                    maior = vetor[i];
                }
                if (vetor[i] < menor) {
                    menor = vetor[i];
                }
            }

            document.getElementById("exibirVetor").innerText = "Números digitados: " + vetor;
            document.getElementById("resultadoMaior").innerText = "O maior é: " + maior;
            document.getElementById("resultadoMenor").innerText = "O menor é: " + menor;
        }
    </script>
</body>
</html>
