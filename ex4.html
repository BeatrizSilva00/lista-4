<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Filtrando Pares</title>
</head>
<body>
    <script>
        let numeros = [];
        let pares = [];

        for (let i = 0; i < 10; i++) {
            let n = Math.floor(Math.random() * 100) + 1; // Gera números aleatórios de 1 a 100
            numeros.push(n);
            
            // Verifica se é par
            if (n % 2 === 0) {
                pares.push(n);
            }
        }

        alert(`Vetor Original: ${numeros.join(", ")}\nNúmeros Pares: ${pares.join(", ")}`);
    </script>
    <h1>Filtrando os Pares</h1>
    <a href="index.html"><button>Voltar</button></a>
</body>
</html>
