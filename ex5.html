<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Busca de Frutas</title>
</head>
<body>
    <script>
        let frutas = ["Maçã", "Banana", "Morango", "Uva", "Abacaxi"];
        let busca = prompt("Qual fruta você deseja buscar?");
        
        // indexOf retorna -1 se não encontrar o item
        let posicao = frutas.indexOf(busca);

        if (posicao !== -1) {
            alert(`A fruta "${busca}" foi encontrada na posição (índice): ${posicao}`);
        } else {
            alert("Fruta não encontrada");
        }
    </script>
    <h1>Onde está o Wally?</h1>
    <a href="index.html"><button>Voltar</button></a>
</body>
</html>
